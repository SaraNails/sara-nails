<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sara Nails | ADM Painel</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2d1b4e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sara Nails">
  <link rel="apple-touch-icon" href="https://cfmtngpivszyzdsszzvj.supabase.co/storage/v1/object/public/assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter','Segoe UI',system-ui,sans-serif; background: #f8f6fb; min-height: 100vh; color: #2c3e50; line-height: 1.5; }
    .admin-nav { background: linear-gradient(135deg,#2d1b4e,#4a1942); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 100; }
    .admin-nav-brand { display: flex; align-items: center; gap: 8px; }
    .admin-nav-brand img { height: 28px; }
    .admin-nav-brand span { font-family: 'Playfair Display',serif; color: #fff; font-size: 14px; font-weight: 600; }
    .admin-nav-links { display: flex; gap: 2px; height: 52px; align-items: stretch; overflow-x: auto; }
    .admin-nav-link { display: flex; align-items: center; padding: 0 12px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; border-bottom: 3px solid transparent; white-space: nowrap; }
    .admin-nav-link:hover { color: #fff; }
    .admin-nav-link.active { color: #fff; border-bottom-color: #8b5cf6; }
    .admin-nav-link.logout-link { opacity: 0.6; font-size: 12px; }
    .admin-nav-link.logout-link:hover { opacity: 1; }
    .admin-content { max-width: 960px; margin: 0 auto; padding: 20px 16px; }
    .section { display: none; } .section.active { display: block; }
    .admin-section-title { font-family: 'Playfair Display',serif; font-size: 20px; color: #2d1b4e; margin-bottom: 16px; }
    .admin-card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 1px 8px rgba(0,0,0,0.04); border: 1px solid #ede0f7; margin-bottom: 16px; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .admin-table th { background: #f5f0fa; padding: 10px 8px; text-align: left; font-weight: 600; color: #2d1b4e; border-bottom: 2px solid #ede0f7; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    .admin-table td { padding: 10px 8px; border-bottom: 1px solid #f0eaf5; vertical-align: middle; }
    .admin-table tr:hover { background: #faf7fd; }
    .tabs { display: flex; background: #ede0f7; border-radius: 8px; padding: 3px; margin-bottom: 16px; }
    .tab { flex: 1; padding: 8px 6px; text-align: center; border: none; background: none; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; color: #6c757d; transition: all 0.2s; }
    .tab.active { background: #fff; color: #6b2fa0; font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
    .badge-pendente { background: #fff3cd; color: #856404; }
    .badge-confirmado { background: #d4edda; color: #155724; }
    .badge-cancelado { background: #f8d7da; color: #721c24; }
    .badge-concluido { background: #e0d4f5; color: #4a1d96; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; color: #6c757d; margin-bottom: 5px; }
    .form-group input, .form-group select { width: 100%; padding: 11px 14px; border: 2px solid #e9ecef; border-radius: 8px; font-size: 15px; outline: none; transition: border-color 0.2s; background: #fff; -webkit-appearance: none; }
    .form-group input:focus { border-color: #6b2fa0; }
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px 20px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; width: 100%; }
    .btn-pink { background: linear-gradient(135deg,#6b2fa0,#8b5cf6); color: #fff; }
    .btn-pink:hover { background: linear-gradient(135deg,#7b3fa0,#9b6cf6); }
    .btn-outline { background: transparent; color: #6b2fa0; border: 2px solid #6b2fa0; }
    .btn-outline:hover { background: #f5f0fa; }
    .btn-success { background: #2ecc71; color: #fff; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-warning { background: #f39c12; color: #fff; }
    .btn-sm { padding: 7px 12px; font-size: 12px; width: auto; border-radius: 6px; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.active { display: flex; }
    .modal { background: #fff; border-radius: 16px; padding: 24px; max-width: 400px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .modal h3 { font-family: 'Playfair Display',serif; color: #2d1b4e; margin-bottom: 16px; }
    .alert { padding: 12px 14px; border-radius: 8px; margin-bottom: 14px; font-size: 14px; }
    .alert-success { background: #d4edda; color: #155724; }
    .alert-error { background: #f8d7da; color: #721c24; }
    .admin-login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg,#f8f6fb,#ede0f7); padding: 20px; }
    .admin-login-box { background: #fff; border-radius: 20px; padding: 36px 28px; max-width: 380px; width: 100%; box-shadow: 0 8px 40px rgba(107,47,160,0.1); text-align: center; }
    .admin-login-box img { width: 90px; margin-bottom: 14px; }
    .admin-login-box h1 { font-family: 'Playfair Display',serif; font-size: 20px; color: #2d1b4e; margin-bottom: 4px; }
    .admin-login-box .sub { font-size: 13px; color: #6c757d; margin-bottom: 20px; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #e9ecef; border-top-color: #6b2fa0; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); z-index: 999; align-items: center; justify-content: center; flex-direction: column; gap: 10px; }
    .loading-overlay.active { display: flex; }
    .text-center { text-align: center; }
    .text-gray { color: #6c757d; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .hidden { display: none !important; }
    .mt-16 { margin-top: 16px; } .mt-24 { margin-top: 24px; } .mb-16 { margin-bottom: 16px; }
    @media (max-width: 650px) {
      .admin-nav { padding: 0 10px; height: 48px; }
      .admin-nav-brand img { height: 24px; }
      .admin-nav-brand span { font-size: 12px; }
      .admin-nav-links { gap: 0; }
      .admin-nav-link { padding: 0 8px; font-size: 11px; }
      .admin-content { padding: 14px 10px; }
      .admin-section-title { font-size: 18px; }
      .admin-card { padding: 14px; border-radius: 12px; }
      .admin-table { font-size: 11px; }
      .admin-table th { padding: 8px 5px; font-size: 10px; }
      .admin-table td { padding: 8px 5px; }
      .btn-sm { padding: 6px 8px; font-size: 11px; }
      .tab { padding: 7px 4px; font-size: 11px; }
      .modal { padding: 20px 16px; margin: 10px; }
      .flex-between { flex-direction: column; align-items: flex-start; }
      .admin-login-box { padding: 28px 20px; }
    }
  </style>
</head>
<body>

  <!-- LOGIN ADMIN -->
  <div id="admin-login-screen">
    <div class="admin-login-wrap">
      <div class="admin-login-box">
        <img src="https://cfmtngpivszyzdsszzvj.supabase.co/storage/v1/object/public/assets/logo.png" alt="Sara Gabriela">
        <h1>Sara Gabriela</h1>
        <p class="sub">Painel Administrativo</p>
        <div id="admin-alert-area"></div>
        <div class="form-group"><label>Email</label><input type="email" id="admin-email" placeholder="seu@email.com"></div>
        <div class="form-group"><label>Senha</label><input type="password" id="admin-password" placeholder="Sua senha"></div>
        <button class="btn btn-pink" onclick="adminLogin()">Entrar</button>
      </div>
    </div>
  </div>

  <!-- PAINEL ADMIN -->
  <div id="admin-panel" class="hidden">
    <div class="admin-nav">
      <div class="admin-nav-brand">
        <img src="https://cfmtngpivszyzdsszzvj.supabase.co/storage/v1/object/public/assets/logo.png" alt="">
        <span>Painel Admin</span>
        <span id="realtime-status" title="Conectando..." style="width:10px;height:10px;border-radius:50%;background:#f39c12;display:inline-block"></span>
      </div>
      <div class="admin-nav-links">
        <a class="admin-nav-link active" onclick="showAdminSection('agendamentos', this)">Agendamentos</a>
        <a class="admin-nav-link" onclick="showAdminSection('servicos', this)">Serviços</a>
        <a class="admin-nav-link" onclick="showAdminSection('horarios', this)">Horários</a>
        <a class="admin-nav-link logout-link" onclick="logout()">Sair</a>
      </div>
    </div>
    <div class="admin-content">
      <!-- AGENDAMENTOS -->
      <div class="section active" id="admin-agendamentos">
        <div class="flex-between mb-16">
          <h2 class="admin-section-title" style="margin-bottom:0">Agendamentos</h2>
          <div class="tabs" style="margin:0;width:auto">
            <button class="tab active" onclick="filterAdmin('hoje', this)">Hoje</button>
            <button class="tab" onclick="filterAdmin('semana', this)">Semana</button>
            <button class="tab" onclick="filterAdmin('mes', this)">Mês</button>
            <button class="tab" onclick="filterAdmin('todos', this)">Todos</button>
          </div>
        </div>
        <div class="admin-card"><div style="overflow-x:auto"><table class="admin-table"><thead><tr><th>Data/Hora</th><th>Cliente</th><th>Contato</th><th>Serviço</th><th>Status</th><th>Ações</th></tr></thead><tbody id="admin-bookings-body"><tr><td colspan="6" class="text-center"><div class="spinner"></div></td></tr></tbody></table></div></div>
      </div>
      <!-- SERVIÇOS -->
      <div class="section" id="admin-servicos">
        <div class="flex-between mb-16">
          <h2 class="admin-section-title" style="margin-bottom:0">Gerenciar Serviços</h2>
          <button class="btn btn-pink btn-sm" onclick="openServiceModal()">+ Novo</button>
        </div>
        <div class="admin-card"><div style="overflow-x:auto"><table class="admin-table"><thead><tr><th>Nome</th><th>Duração</th><th>Preço</th><th>Ativo</th><th>Ações</th></tr></thead><tbody id="admin-services-body"><tr><td colspan="5" class="text-center"><div class="spinner"></div></td></tr></tbody></table></div></div>
      </div>
      <!-- HORÁRIOS -->
      <div class="section" id="admin-horarios">
        <h2 class="admin-section-title">Horários de Funcionamento</h2>
        <div class="admin-card">
          <div id="admin-horarios-list"><div class="text-center"><div class="spinner"></div></div></div>
          <button class="btn btn-pink mt-24" onclick="saveHorarios()">Salvar Horários</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="service-modal">
    <div class="modal">
      <h3 id="service-modal-title">Novo Serviço</h3>
      <input type="hidden" id="service-edit-id">
      <div class="form-group"><label>Nome do serviço</label><input type="text" id="service-name" placeholder="Ex: Manutenção de alongamento"></div>
      <div class="form-group"><label>Duração (minutos)</label><input type="number" id="service-duration" placeholder="60" min="15" step="15"></div>
      <div class="form-group"><label>Preço (R$)</label><input type="number" id="service-price" placeholder="80.00" min="0" step="0.01"></div>
      <div style="display:flex;gap:8px;margin-top:16px"><button class="btn btn-pink" onclick="saveService()">Salvar</button><button class="btn btn-outline" onclick="closeServiceModal()">Cancelar</button></div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-overlay" id="loading"><div class="spinner" style="width:40px;height:40px"></div><p>Carregando...</p></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    var SUPABASE_URL = 'https://cfmtngpivszyzdsszzvj.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmbXRuZ3BpdnN6eXpkc3N6enZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NTk4NTMsImV4cCI6MjA5MTMzNTg1M30.l9GZEdA7jale6Zo7wg5M_zacvlBq4sfTVeFF1ocQ_Ws';
    var ADMIN_EMAIL = 'rsara4259@gmail.com';
    var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { storageKey: 'sb-admin-auth' } });

    // ===== INIT =====
    var adminFilter = 'hoje';
    (async function() {
      try {
        var s = await db.auth.getSession();
        if (s.data.session && s.data.session.user.email === ADMIN_EMAIL) { showAdminPanel(); return; }
        if (s.data.session) await db.auth.signOut();
      } catch(e) { console.error(e); }
      document.getElementById('admin-login-screen').classList.remove('hidden');
      document.getElementById('admin-panel').classList.add('hidden');
    })();

    // ===== LOGIN =====
    async function adminLogin() {
      var email = document.getElementById('admin-email').value.trim();
      var pw = document.getElementById('admin-password').value;
      if (!email || !pw) { showAdminAlert('Preencha email e senha','error'); return; }
      showLoading(true);
      try {
        var r = await db.auth.signInWithPassword({email:email,password:pw});
        showLoading(false);
        if (r.error) { showAdminAlert('Erro: '+r.error.message,'error'); return; }
        if (r.data.user.email !== ADMIN_EMAIL) { showAdminAlert('Sem permissão de admin.','error'); await db.auth.signOut(); return; }
        showAdminPanel();
      } catch(e) { showLoading(false); showAdminAlert('Erro: '+e.message,'error'); }
    }

    function showAdminAlert(msg,type) {
      var a = document.getElementById('admin-alert-area');
      a.innerHTML = '<div class="alert alert-'+type+'">'+msg+'</div>';
      setTimeout(function(){ a.innerHTML=''; }, 5000);
    }

    function showAdminPanel() {
      document.getElementById('admin-login-screen').classList.add('hidden');
      document.getElementById('admin-panel').classList.remove('hidden');
      loadAdminBookings(); loadAdminServices(); loadAdminHorarios();
    }

    function showAdminSection(name, btn) {
      document.querySelectorAll('.section').forEach(function(s){ s.classList.remove('active'); });
      document.getElementById('admin-'+name).classList.add('active');
      document.querySelectorAll('.admin-nav-link').forEach(function(l){ l.classList.remove('active'); });
      if (btn) btn.classList.add('active');
    }

    async function logout() {
      await db.auth.signOut();
      document.getElementById('admin-panel').classList.add('hidden');
      document.getElementById('admin-login-screen').classList.remove('hidden');
      document.getElementById('admin-email').value = '';
      document.getElementById('admin-password').value = '';
    }

    function showLoading(show) { document.getElementById('loading').classList.toggle('active', show); }

    // ===== AGENDAMENTOS =====
    async function loadAdminBookings() {
      var tbody = document.getElementById('admin-bookings-body');
      tbody.innerHTML = '<tr><td colspan="6" class="text-center"><div class="spinner"></div></td></tr>';
      var now = new Date();
      var query = db.from('agendamentos').select('*, servicos(nome)').order('data_hora',{ascending:true});
      if (adminFilter === 'hoje') {
        var s = new Date(now.getFullYear(),now.getMonth(),now.getDate()).toISOString();
        var e = new Date(now.getFullYear(),now.getMonth(),now.getDate()+1).toISOString();
        query = query.gte('data_hora',s).lt('data_hora',e);
      } else if (adminFilter === 'semana') {
        var s = new Date(now.getFullYear(),now.getMonth(),now.getDate()).toISOString();
        var e = new Date(now.getFullYear(),now.getMonth(),now.getDate()+7).toISOString();
        query = query.gte('data_hora',s).lt('data_hora',e);
      } else if (adminFilter === 'mes') {
        var s = new Date(now.getFullYear(),now.getMonth(),1).toISOString();
        var e = new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59).toISOString();
        query = query.gte('data_hora',s).lte('data_hora',e);
      }
      var r = await query;
      if (r.error) { tbody.innerHTML = '<tr><td colspan="6" class="text-center text-gray">Erro ao carregar</td></tr>'; return; }
      if (!r.data || r.data.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="text-center text-gray">Nenhum agendamento encontrado</td></tr>'; return; }
      tbody.innerHTML = r.data.map(function(b) {
        var d = new Date(b.data_hora);
        var ds = d.toLocaleDateString('pt-BR');
        var ts = d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
        var sn = b.servicos ? b.servicos.nome : '-';
        var act = '';
        if (b.status === 'pendente') act = '<button class="btn btn-success btn-sm" onclick="updateStatus(\''+b.id+'\',\'confirmado\')">Confirmar</button> <button class="btn btn-danger btn-sm" onclick="updateStatus(\''+b.id+'\',\'cancelado\')">Cancelar</button>';
        else if (b.status === 'confirmado') act = '<button class="btn btn-sm" style="background:#0c5460;color:#fff" onclick="updateStatus(\''+b.id+'\',\'concluido\')">Concluir</button> <button class="btn btn-danger btn-sm" onclick="updateStatus(\''+b.id+'\',\'cancelado\')">Cancelar</button>';
        return '<tr><td><strong>'+ds+'</strong><br>'+ts+'</td><td>'+(b.cliente_nome||'-')+'</td><td>'+(b.cliente_telefone||'-')+'</td><td>'+sn+'</td><td><span class="badge badge-'+b.status+'">'+b.status+'</span></td><td style="display:flex;gap:4px;flex-wrap:wrap">'+act+'</td></tr>';
      }).join('');
    }

    function filterAdmin(filter, btn) {
      adminFilter = filter;
      document.querySelectorAll('#admin-agendamentos .tab').forEach(function(t){ t.classList.remove('active'); });
      btn.classList.add('active');
      loadAdminBookings();
    }

    async function updateStatus(id, status) {
      showLoading(true);
      await db.from('agendamentos').update({status:status}).eq('id',id);
      showLoading(false);
      loadAdminBookings();
    }

    // ===== SERVIÇOS =====
    async function loadAdminServices() {
      var tbody = document.getElementById('admin-services-body');
      tbody.innerHTML = '<tr><td colspan="5" class="text-center"><div class="spinner"></div></td></tr>';
      var r = await db.from('servicos').select('*').order('nome');
      if (r.error || !r.data) { tbody.innerHTML = '<tr><td colspan="5" class="text-center text-gray">Erro ao carregar</td></tr>'; return; }
      if (r.data.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="text-center text-gray">Nenhum serviço cadastrado</td></tr>'; return; }
      tbody.innerHTML = r.data.map(function(s) {
        var p = new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(s.preco);
        return '<tr><td><strong>'+s.nome+'</strong></td><td>'+s.duracao_min+' min</td><td>'+p+'</td><td>'+(s.ativo?'<span style="color:#2ecc71">Sim</span>':'<span style="color:#e74c3c">Não</span>')+'</td><td style="display:flex;gap:4px"><button class="btn btn-outline btn-sm" onclick="editService(\''+s.id+'\',\''+s.nome.replace(/'/g,"\\'")+'\','+s.duracao_min+','+s.preco+')">Editar</button><button class="btn btn-sm '+(s.ativo?'btn-warning':'btn-success')+'" onclick="toggleService(\''+s.id+'\','+(!s.ativo)+')">'+(s.ativo?'Desativar':'Ativar')+'</button></td></tr>';
      }).join('');
    }

    function openServiceModal() {
      document.getElementById('service-modal-title').textContent = 'Novo Serviço';
      document.getElementById('service-edit-id').value = '';
      document.getElementById('service-name').value = '';
      document.getElementById('service-duration').value = '';
      document.getElementById('service-price').value = '';
      document.getElementById('service-modal').classList.add('active');
    }

    function editService(id,nome,dur,preco) {
      document.getElementById('service-modal-title').textContent = 'Editar Serviço';
      document.getElementById('service-edit-id').value = id;
      document.getElementById('service-name').value = nome;
      document.getElementById('service-duration').value = dur;
      document.getElementById('service-price').value = preco;
      document.getElementById('service-modal').classList.add('active');
    }

    function closeServiceModal() { document.getElementById('service-modal').classList.remove('active'); }

    async function saveService() {
      var id = document.getElementById('service-edit-id').value;
      var nome = document.getElementById('service-name').value.trim();
      var dur = parseInt(document.getElementById('service-duration').value);
      var preco = parseFloat(document.getElementById('service-price').value);
      if (!nome || !dur || isNaN(preco)) { alert('Preencha todos os campos'); return; }
      showLoading(true);
      var payload = {nome:nome, duracao_min:dur, preco:preco, ativo:true};
      if (id) await db.from('servicos').update(payload).eq('id',id);
      else await db.from('servicos').insert(payload);
      showLoading(false);
      closeServiceModal();
      loadAdminServices();
    }

    async function toggleService(id, ativo) {
      showLoading(true);
      await db.from('servicos').update({ativo:ativo}).eq('id',id);
      showLoading(false);
      loadAdminServices();
    }

    // ===== HORÁRIOS =====
    var DIAS = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
    var horariosData = [];

    async function loadAdminHorarios() {
      var c = document.getElementById('admin-horarios-list');
      var r = await db.from('horarios_disponiveis').select('*').order('dia_semana');
      horariosData = r.data || [];
      c.innerHTML = DIAS.map(function(dia,i) {
        var h = horariosData.find(function(x){ return x.dia_semana === i; });
        var ativo = h ? h.ativo : false;
        var ini = h ? h.hora_inicio : '08:00';
        var fim = h ? h.hora_fim : '18:00';
        var intv = h ? h.intervalo_min : 60;
        return '<div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #f0eaf5;flex-wrap:wrap"><label style="width:90px;font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px"><input type="checkbox" class="horario-ativo" data-dia="'+i+'" '+(ativo?'checked':'')+'>'+dia+'</label><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"><input type="time" class="horario-inicio" data-dia="'+i+'" value="'+ini+'" style="padding:6px;border:1px solid #e0d4f5;border-radius:6px;font-size:13px"><span style="font-size:12px;color:#6c757d">até</span><input type="time" class="horario-fim" data-dia="'+i+'" value="'+fim+'" style="padding:6px;border:1px solid #e0d4f5;border-radius:6px;font-size:13px"><span style="font-size:12px;color:#6c757d">a cada</span><input type="number" class="horario-intervalo" data-dia="'+i+'" value="'+intv+'" min="15" step="15" style="width:55px;padding:6px;border:1px solid #e0d4f5;border-radius:6px;font-size:13px"><span style="font-size:12px;color:#6c757d">min</span></div></div>';
      }).join('');
    }

    async function saveHorarios() {
      showLoading(true);
      for (var i = 0; i < 7; i++) {
        var ativo = document.querySelector('.horario-ativo[data-dia="'+i+'"]').checked;
        var ini = document.querySelector('.horario-inicio[data-dia="'+i+'"]').value;
        var fim = document.querySelector('.horario-fim[data-dia="'+i+'"]').value;
        var intv = parseInt(document.querySelector('.horario-intervalo[data-dia="'+i+'"]').value) || 60;
        var existing = horariosData.find(function(x){ return x.dia_semana === i; });
        var payload = {dia_semana:i, hora_inicio:ini, hora_fim:fim, intervalo_min:intv, ativo:ativo};
        if (existing) await db.from('horarios_disponiveis').update(payload).eq('id',existing.id);
        else await db.from('horarios_disponiveis').insert(payload);
      }
      showLoading(false);
      alert('Horários salvos com sucesso!');
      loadAdminHorarios();
    }

    // ===== PWA + NOTIFICAÇÕES (POLLING) =====
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(e){});
    }

    function pedirPermissaoNotificacao() {
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }
    }

    // Polling - verifica novos agendamentos a cada 10 segundos
    var conhecidos = [];
    var pollingInterval = null;

    function iniciarPollingNotificacoes() {
      // Carrega IDs dos agendamentos pendentes atuais
      db.from('agendamentos').select('id').eq('status','pendente').then(function(r) {
        conhecidos = (r.data || []).map(function(a){ return a.id; });

        var indicator = document.getElementById('realtime-status');
        if (indicator) { indicator.style.background = '#2ecc71'; indicator.title = 'Notificações ativas'; }

        if (pollingInterval) clearInterval(pollingInterval);
        pollingInterval = setInterval(verificarNovosAgendamentos, 10000);

        showToast('Notificações ativadas!');
      });
    }

    async function verificarNovosAgendamentos() {
      try {
        var r = await db.from('agendamentos').select('*,servicos(nome)').eq('status','pendente');
        if (!r.data) return;

        // Filtra só os novos (IDs que não conhecemos)
        var novos = r.data.filter(function(a){ return conhecidos.indexOf(a.id) === -1; });
        if (novos.length === 0) return;

        // Adiciona os novos aos conhecidos
        novos.forEach(function(a){ conhecidos.push(a.id); });

        // Notifica cada novo agendamento
        novos.forEach(function(ag) {
          var nome = ag.cliente_nome || 'Cliente';
          var dataHora = new Date(ag.data_hora);
          var dataStr = dataHora.toLocaleDateString('pt-BR');
          var horaStr = dataHora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
          var servico = ag.servicos ? ag.servicos.nome : '';
          var msg = nome + ' agendou ' + servico + ' para ' + dataStr + ' às ' + horaStr;

          // Notificação do navegador
          if ('Notification' in window && Notification.permission === 'granted') {
            new Notification('Novo Agendamento!', {
              body: msg,
              icon: 'https://cfmtngpivszyzdsszzvj.supabase.co/storage/v1/object/public/assets/logo.png',
              tag: 'agendamento-' + ag.id,
              renotify: true,
              vibrate: [200, 100, 200]
            });
          }

          // Toast na tela
          showToast(msg);
        });

        // Atualiza tabela
        loadAdminBookings();
      } catch(e) { console.error('Polling erro:', e); }
    }

    function showToast(msg) {
      var toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#6b2fa0,#8b5cf6);color:#fff;padding:14px 24px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 8px 32px rgba(107,47,160,0.3);z-index:9999;max-width:90%;text-align:center;animation:slideUp 0.3s ease';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(function(){ toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(function(){ toast.remove(); }, 300); }, 5000);
    }

    var toastStyle = document.createElement('style');
    toastStyle.textContent = '@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}';
    document.head.appendChild(toastStyle);

    // Banner instalar PWA
    var deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      var btn = document.createElement('button');
      btn.textContent = 'Instalar App';
      btn.style.cssText = 'position:fixed;bottom:20px;right:20px;background:linear-gradient(135deg,#6b2fa0,#8b5cf6);color:#fff;border:none;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(107,47,160,0.3);z-index:9999';
      btn.onclick = function() { deferredPrompt.prompt(); deferredPrompt.userChoice.then(function(){ deferredPrompt = null; btn.remove(); }); };
      document.body.appendChild(btn);
    });

    // Inicia quando o painel é mostrado
    var originalShowAdminPanel = showAdminPanel;
    showAdminPanel = function() {
      originalShowAdminPanel();
      pedirPermissaoNotificacao();
      iniciarPollingNotificacoes();
    };
  </script>
</body>
</html>
